version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Dev-deps only — karhu has zero runtime deps
    allow:
      - dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
